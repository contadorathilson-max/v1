}

android {
    namespace 'com.athilson.sorteadortimes'
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId 'com.athilson.sorteadortimes'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.1'
    }
}
